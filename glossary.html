        .glossary-header {

        .search-container {

        .search-box {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            border: 2px solid var(--gray-300);
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--black);
        }

        .filter-container {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

            padding: 0.5rem 1rem;
            border: 1px solid var(--gray-300);
            background: white;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {

        }

        .filter-btn.active {
            background: var(--black);
            color: white;
            border-color: var(--black);
        }

            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;

            background: white;
            cursor: pointer;

            font-weight: 600;
            transition: all 0.2s ease;
        }

        .alphabet-btn:hover {
            background: var(--gray-100);
            border-color: var(--black);
        }

        .alphabet-btn.active {
            background: var(--black);
            color: white;
        }

        .glossary-grid {
            display: grid;
            gap: 1rem;
        }

        .glossary-item {
            border: 1px solid var(--gray-300);
            background: white;
            transition: all 0.2s ease;
        }

        .glossary-item.hidden {
            display: none;
        }

        .glossary-header-item {
            padding: 1.25rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            user-select: none;
        }

        .glossary-header-item:hover {
            background: var(--gray-50);
        }

        .glossary-term {
            flex: 1;
        }

        .glossary-term h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: var(--black);
        }

        .glossary-category {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--gray-100);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.5rem;
        }

        .glossary-icon {
            font-size: 1.5rem;
            color: var(--gray-600);
            transition: transform 0.3s ease;
        }

        .glossary-item.active .glossary-icon {
            transform: rotate(180deg);
        }

        .glossary-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .glossary-item.active .glossary-content {
            max-height: 1000px;
        }

        .glossary-body {
            padding: 0 1.25rem 1.25rem 1.25rem;
        }

        .definition-section {
            margin-bottom: 1.5rem;
        }

        .definition-section:last-child {
            margin-bottom: 0;
        }

        .definition-lang {
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--gray-600);
            margin-bottom: 0.5rem;
        }

        .definition-text {
            font-size: 1rem;
            line-height: 1.6;

            border-top: 1px solid var(--gray-200);
        }

        .related-terms-title {
            font-weight: 600;
            font-size: 0.875rem;

            color: var(--gray-700);
        }

        .related-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .related-link {
            padding: 0.25rem 0.75rem;
            background: var(--gray-100);
            color: var(--black);
            text-decoration: none;
            font-size: 0.875rem;
            transition: background 0.2s ease;
        }

        .related-link:hover {
            background: var(--gray-200);
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--gray-600);
        }

            justify-content: center;

            background: var(--gray-50);
            margin-bottom: 2rem;
            flex-wrap: wrap;

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--black);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--gray-600);
            margin-top: 0.25rem;
        }

        @media (max-width: 768px) {

                height: 2rem;
                font-size: 0.875rem;
            }

            .glossary-term h3 {
                font-size: 1.125rem;
            }
        }
